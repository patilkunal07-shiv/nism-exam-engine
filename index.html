<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NISM Exam Engine</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#0f172a;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

textarea{
width:100%;
height:350px;
margin-top:15px;
padding:10px;
font-size:16px;
}

input{
margin:15px 0;
}

.loader{
display:none;
margin-top:10px;
font-weight:bold;
color:#2563eb;
}
</style>

</head>

<body>

<div class="container">

<h1>NISM Exam Engine</h1>

<p>AI Powered Exam Preparation Platform</p>

<input type="file" id="pdfFile">

<br><br>

<button onclick="generateNotes()">
Generate Notes
</button>

<div id="loading" class="loader">
Generating Notes...
</div>

<textarea
id="output"
placeholder="Generated Notes Here...">
</textarea>

</div>

<script>

async function generateNotes(){

const output = document.getElementById("output");
const loading = document.getElementById("loading");

loading.style.display = "block";

output.value = "";

try{

const response = await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:"Create NISM exam short notes, important points, revision notes and MCQs."
})
});

const data = await response.json();

if(data.result){

output.value = data.result;

}
else if(data.message){

output.value = data.message;

}
else if(data.error){

output.value = data.error;

}
else{

output.value = JSON.stringify(data,null,2);

}

}catch(err){

output.value = "ERROR : " + err.message;

}

loading.style.display = "none";

}

</script>

</body>
</html>
