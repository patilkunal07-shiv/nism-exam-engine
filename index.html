<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NISM Exam Engine</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#0f172a;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

textarea{
width:100%;
height:350px;
margin-top:15px;
padding:10px;
font-size:15px;
}

input{
margin:15px 0;
}

</style>
</head>

<body>

<div class="container">

<h1>NISM Exam Engine</h1>

<p>AI Powered Exam Preparation Platform</p>

<input type="file" id="pdfFile">

<br><br>

<button onclick="generateNotes()">
Generate Notes
</button>

<textarea
id="output"
placeholder="Generated Notes Here..."
></textarea>

</div>

<script>

async function generateNotes(){

const output=document.getElementById("output");

output.value="Generating Notes... Please Wait";

try{

const response=await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:`
Create NISM Exam Notes.

Give:

1. Short Notes
2. Long Notes
3. Important Exam Points
4. Memory Tricks
5. 10 MCQs With Answers
6. Revision Summary

Use Easy English.
`
})
});

const data=await response.json();

output.value=data.result || data.error;

}
catch(error){

output.value=error.message;

}

}

</script>

</body>
</html>
